aid: eindhoven-university-of-technology
name: Eindhoven University of Technology
description: >-
  Eindhoven University of Technology (TU/e) is a research-driven public technical
  university in Eindhoven, Netherlands, ranked #136 in the QS World University
  Rankings 2025. Its public, machine-readable developer footprint centers on its
  Elsevier Pure research information system, which exposes the institutional
  research output through an OAI-PMH metadata-harvesting interface and the Pure
  Web Service (REST/SOAP) API. TU/e does not operate a single consolidated public
  developer portal; programmatic access to course, identity, and library systems
  is generally institution-internal or vendor-mediated, and numerous departmental
  research groups publish open-source code across separate GitHub organizations.
