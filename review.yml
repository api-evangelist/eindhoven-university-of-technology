    summary: >-
      TU/e (QS World 2025 #136) has a modest, mostly vendor-mediated public API
      footprint. Confirmed live: the official website and the Elsevier Pure
      Research Portal (research.tue.nl, 200). The Pure OAI-PMH endpoint
      (pure.tue.nl/ws/oai) and Pure Web Service path resolve but returned 500/999
      errors to bare unauthenticated probes, consistent with Pure requiring
      well-formed OAI verbs or API-key authentication rather than being broken.
      No single consolidated public developer portal was found; course/identity/
      library access is institution-internal or vendor-gated. Many departmental
      GitHub orgs exist (tue-robotics, TUE-EE-ES, tueimage, etc.) but no single
      official org. No endpoints were fabricated; gated/erroring endpoints are
      noted honestly.
